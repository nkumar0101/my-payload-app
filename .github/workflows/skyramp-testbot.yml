name: Skyramp Testbot

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  testbot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create .env file
        run: |
          cat <<EOF > .env
          DATABASE_URL=file:./my-payload-app.db
          PAYLOAD_SECRET=ci-test-secret-key
          NEXT_PUBLIC_SERVER_URL=http://localhost:3000
          EOF

      - uses: skyramp/testbot@v0.2.0
        with:
          skyramp_license_file: ${{ secrets.SKYRAMP_LICENSE }}
          anthropic_api_key: ${{ secrets.SKYRAMP_TESTBOT_API_KEY }}
          service_startup_command: 'pnpm install && pnpm build && pnpm start &'
          test_directory: 'tests'